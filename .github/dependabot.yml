version: 2

updates:
    -   package-ecosystem: composer
        directory: /
        schedule:
            interval: weekly
        open-pull-requests-limit: 5
        groups:
            composer:
                patterns:
                    - "*"

    -   package-ecosystem: npm
        directory: /
        schedule:
            interval: weekly
        open-pull-requests-limit: 5
        groups:
            npm:
                patterns:
                    - "*"

    -   package-ecosystem: github-actions
        directory: /
        schedule:
            interval: weekly
        groups:
            github-actions:
                patterns:
                    - "*"
