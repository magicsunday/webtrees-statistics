name: CI

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ['8.3', '8.4', '8.5']

        steps:
            - id: checkout
              name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - id: setup_node
              name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: npm

            - id: setup_php
              name: Set up PHP version ${{ matrix.php }}
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: ${{ matrix.php }}
                  tools: composer:v2

            - name: Validate composer.json and composer.lock
              run: composer validate

            - id: composer-cache-vars
              name: Composer Cache Vars
              run: |
                  echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
                  echo "timestamp=$(date +"%s")" >> $GITHUB_OUTPUT

            - id: composer-cache-dependencies
              name: Cache Composer dependencies
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ${{ steps.composer-cache-vars.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ steps.composer-cache-vars.outputs.timestamp }}
                  restore-keys: |
                      ${{ runner.os }}-composer-${{ matrix.php }}-
                      ${{ runner.os }}-composer-

            - id: install
              name: Install dependencies
              env:
                  COMPOSER_NO_AUDIT: "1"
                  COMPOSER_NO_INTERACTION: "1"
              run: |
                  composer install --no-progress
                  npm ci

            - id: php-lint
              name: PHP Lint
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:php:lint

            - id: js-lint
              name: JS Lint
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:js:lint

            - id: js-format
              name: JS Format
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:js:format

            - id: js-typecheck
              name: JS Typecheck
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:js:typecheck

            - id: phpstan
              name: PHPStan
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:php:phpstan -- --error-format=github

            - id: rector
              name: Rector
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:php:rector

            - id: cpd
              name: Copy/Paste Detection
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:cpd

            - id: php-unit
              name: PHP Unit Tests
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:php:unit

            - id: js-unit
              name: JS Unit Tests
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:test:js:unit

            - id: cgl
              name: CGL
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  composer ci:cgl -- --dry-run

            # Runs LAST: 'make dist' invokes 'composer install --no-dev'
            # which strips dev packages (php-cs-fixer, phpstan, ...) from
            # .build/vendor. Any later composer-driven step would fail.
            - id: dist-smoke
              name: Release zip smoke test
              if: ${{ success() }}
              run: |
                  make dist
                  make dist-smoke
                  rm -f *.zip

    # The `build` job runs the test suite against in-memory SQLite, which does
    # not implement ONLY_FULL_GROUP_BY and so silently tolerates a grouped
    # SELECT with a non-aggregated column. This job re-runs the DB-touching
    # integration tests against a real MySQL 8 — where webtrees' ANSI sql_mode
    # implies ONLY_FULL_GROUP_BY (with functional-dependency detection), exactly
    # the reporting environment — making it the gate for the whole error-1055
    # bug class (e.g. #46, #126). MySQL, not MariaDB: MariaDB's OFGB lacks the
    # functional-dependency detection and would reject the standard full-PK
    # GROUP BY idiom that MySQL and core webtrees rely on. One PHP version is
    # enough: the failure is engine-specific, not PHP-version-specific.
    integration-mysql:
        name: Integration tests (MySQL 8, ONLY_FULL_GROUP_BY)
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.4
                env:
                    MYSQL_ROOT_PASSWORD: ci-test
                    MYSQL_DATABASE: webtrees_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h localhost -uroot -pci-test"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=10

        steps:
            - id: checkout
              name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - id: setup_php
              name: Set up PHP version 8.4
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.4'
                  extensions: pdo_mysql
                  tools: composer:v2

            - id: install
              name: Install dependencies
              env:
                  COMPOSER_NO_AUDIT: "1"
                  COMPOSER_NO_INTERACTION: "1"
              run: |
                  composer install --no-progress

            - id: integration
              name: Integration tests against MySQL
              env:
                  # Per-test schema resets against a real server outrun
                  # Composer's default 300 s process timeout.
                  COMPOSER_PROCESS_TIMEOUT: "0"
                  WT_TEST_DB_DRIVER: mysql
                  WT_TEST_DB_HOST: 127.0.0.1
                  WT_TEST_DB_PORT: "3306"
                  WT_TEST_DB_NAME: webtrees_test
                  WT_TEST_DB_USER: root
                  WT_TEST_DB_PASSWORD: ci-test
              run: |
                  composer ci:test:php:integration
